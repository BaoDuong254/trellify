pre-commit:
  parallel: true
  commands:
    format:
      glob: "*"
      run: pnpm format:fix
      stage_fixed: true

    lint:
      glob: "*"
      run: pnpm lint:fix
      stage_fixed: true

    check-lockfile:
      run: bash scripts/check-lockfile.sh

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}

post-commit:
  commands:
    success-message:
      run: |
        git update-index --again
        echo "⬆️ Commit successfully made!"
        echo "🚀 Don't forget to push your changes!"
