on:
  workflow_run:
    workflows: ["Deploy Production"]
    types:
      - completed
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

name: release-please

jobs:
  release-please:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.MY_RELEASE_PLEASE_TOKEN }}
          release-type: node

      - name: Check for open package version pull request
        id: check_version_pr
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.MY_RELEASE_PLEASE_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const { data: pulls } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              base: 'main',
              per_page: 100,
            });

            const hasOpenVersionPR = pulls.some(
              (pr) =>
                pr.title.startsWith('chore: update package version to') ||
                pr.title.startsWith('chore: update api version to')
            );

            core.info(`Open package version PR found: ${hasOpenVersionPR}`);
            core.setOutput('has_open_version_pr', hasOpenVersionPR ? 'true' : 'false');

      - name: Checkout repository for sync
        if: steps.check_version_pr.outputs.has_open_version_pr != 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.MY_RELEASE_PLEASE_TOKEN }}

      - name: Sync main into develop
        if: steps.check_version_pr.outputs.has_open_version_pr != 'true'
        env:
          GH_TOKEN: ${{ secrets.MY_RELEASE_PLEASE_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          PR_TITLE="chore: sync main into develop"
          PR_BODY='Auto-generated PR to sync changes from `main` into `develop`.'

          OPEN_PR_NUMBER=$(gh pr list \
            --repo "$REPO" \
            --state open \
            --base develop \
            --head main \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$OPEN_PR_NUMBER" ]; then
            echo "Updating existing PR #$OPEN_PR_NUMBER"
            gh pr edit "$OPEN_PR_NUMBER" \
              --repo "$REPO" \
              --title "$PR_TITLE" \
              --body "$PR_BODY"
          else
            echo "Creating new PR from main to develop"
            gh pr create \
              --repo "$REPO" \
              --base develop \
              --head main \
              --title "$PR_TITLE" \
              --body "$PR_BODY"
          fi
