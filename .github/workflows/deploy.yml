name: Deploy Production

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

jobs:
  build-and-push:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Create .env file for server
        run: echo "${{ secrets.SERVER_ENV }}" > apps/server/.env

      - name: Create .env file for client
        run: echo "${{ secrets.CLIENT_ENV }}" > apps/client/.env

      - name: Create root .env file for docker-compose
        run: |
          echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" > .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push server image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./apps/server/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/trellify-server:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/trellify-server:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/trellify-server:buildcache,mode=max

      - name: Build and push client image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./apps/client/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/trellify-client:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/trellify-client:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/trellify-client:buildcache,mode=max

      - name: Send telegram message after build success
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ✅ Build and push Docker images completed successfully.
            👤 ${{ github.event.workflow_run.actor.login }} created commit:
            🧑‍💻 Commit message: ${{ github.event.workflow_run.head_commit.message }}
            📦 Repository: ${{ github.repository }}
            🐳 Images:
            - ${{ secrets.DOCKERHUB_USERNAME }}/trellify-server:latest
            - ${{ secrets.DOCKERHUB_USERNAME }}/trellify-client:latest
            👀 See changes: https://github.com/${{ github.repository }}/commit/${{github.event.workflow_run.head_sha}}

      - name: Send telegram message after build failure
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ❌ Build and push Docker images failed.
            👤 ${{ github.event.workflow_run.actor.login }} created commit:
            🧑‍💻 Commit message: ${{ github.event.workflow_run.head_commit.message }}
            📦 Repository: ${{ github.repository }}
            👀 See changes: https://github.com/${{ github.repository }}/commit/${{github.event.workflow_run.head_sha}}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code for docker-compose
        uses: actions/checkout@v6

      - name: Create .env file for server
        run: echo "${{ secrets.SERVER_ENV }}" > apps/server/.env

      - name: Create .env file for client
        run: echo "${{ secrets.CLIENT_ENV }}" > apps/client/.env

      - name: Create root .env file for docker-compose
        run: |
          echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" > .env

      - name: Copy files to LXC
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.HOST_VPS }}
          username: ${{ secrets.USERNAME_VPS }}
          key: ${{ secrets.KEY_VPS }}
          port: ${{ secrets.PORT_VPS }}
          source: "apps/server/.env,apps/client/.env,.env,docker-compose.yml"
          target: "~/trellify"

      - name: Deploy to LXC via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST_VPS }}
          username: ${{ secrets.USERNAME_VPS }}
          key: ${{ secrets.KEY_VPS }}
          port: ${{ secrets.PORT_VPS }}
          script: |
            cd ~/trellify

            # Login to Docker Hub
            echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

            # Set environment variables for docker-compose
            export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}

            # Stop and remove old containers first
            docker compose down

            # Pull latest images
            docker compose pull

            # Start containers with 3 server replicas
            docker compose up -d --scale server=3 --remove-orphans

            # Verify server replicas
            SERVER_REPLICAS=$(docker compose ps -q server | wc -l)
            if [ "$SERVER_REPLICAS" -ne 3 ]; then
              echo "Expected 3 server replicas, but found $SERVER_REPLICAS"
              exit 1
            fi

            # Clean up unused images
            docker image prune -af

            # Show running containers
            docker compose ps

      - name: Send telegram message after deploy success
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ✅ Deployment to LXC completed successfully.
            👤 ${{ github.event.workflow_run.actor.login }} created commit:
            🧑‍💻 Commit message: ${{ github.event.workflow_run.head_commit.message }}
            📦 Repository: ${{ github.repository }}
            🚀 Application is now running on LXC with 3 server replicas
            👀 See changes: https://github.com/${{ github.repository }}/commit/${{github.event.workflow_run.head_sha}}

      - name: Send telegram message after deploy failure
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ❌ Deployment to LXC failed.
            👤 ${{ github.event.workflow_run.actor.login }} created commit:
            🧑‍💻 Commit message: ${{ github.event.workflow_run.head_commit.message }}
            📦 Repository: ${{ github.repository }}
            👀 See changes: https://github.com/${{ github.repository }}/commit/${{github.event.workflow_run.head_sha}}
