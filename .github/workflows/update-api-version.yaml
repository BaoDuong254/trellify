name: Update Package Version and Release
on:
  workflow_run:
    workflows: ["Deploy Production"]
    types:
      - completed
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  update-version:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve version from changelog or tags
        id: resolve_version
        run: |
          VERSION=""

          if [ -f CHANGELOG.md ]; then
            VERSION=$(grep -oP '\[\K[0-9]+\.[0-9]+\.[0-9]+' CHANGELOG.md | head -1 || true)
          fi

          if [ -z "$VERSION" ]; then
            VERSION=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1 | sed 's/^v//' || true)
          fi

          if [ -z "$VERSION" ]; then
            VERSION=$(git tag --list '[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1 || true)
          fi

          if [ -z "$VERSION" ]; then
            echo "No version source found (CHANGELOG.md or git tags). Skipping update."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Resolved version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Update version in package.json
        if: steps.resolve_version.outputs.skip != 'true'
        run: |
          node -e "const fs=require('node:fs'); const path='package.json'; const pkg=JSON.parse(fs.readFileSync(path, 'utf8')); pkg.version='${{ steps.resolve_version.outputs.version }}'; fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');"

      - name: Create pull request with version update
        if: steps.resolve_version.outputs.skip != 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.MY_RELEASE_PLEASE_TOKEN }}
          commit-message: "chore: update package version to ${{ steps.resolve_version.outputs.version }}"
          title: "chore: update package version to ${{ steps.resolve_version.outputs.version }}"
          body: |
            This PR was created automatically to keep package.json version
            in sync with the latest release version.
            Version source priority:
            1) CHANGELOG.md
            2) latest semantic git tag
          branch: "chore/update-package-version-${{ steps.resolve_version.outputs.version }}"
          base: main
          add-paths: |
            package.json
          delete-branch: true
